<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitaPulse AI Assistant</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ---------- CSS CUSTOM PROPERTIES ---------- */
        :root {
            --bg-primary: #0a0a0a;
            --bg-card: #161616;
            --accent-teal: #1de9b6;
            --accent-gold: #f5a623;
            --text-primary: #ffffff;
            --text-muted: #888888;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --radius-box: 22px;
            --radius-btn: 50px;
        }

        /* ---------- FULL SCREEN RESET ---------- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Subtle background glow effect */
        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(29, 233, 182, 0.06) 0%, transparent 70%);
            bottom: -50px;
            right: -50px;
            pointer-events: none;
            z-index: 0;
        }

        /* ---------- CHATBOX FULLSCREEN CONTAINER ---------- */
        .chat-container {
            width: 100%;
            height: 100%;
            max-width: 1000px;
            max-height: 850px;
            background: rgba(22, 22, 22, 0.7);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-box);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8);
            z-index: 1;
            margin: 20px;
            overflow: hidden;
        }

        /* Mobile full screen override */
        @media (max-width: 768px) {
            .chat-container {
                margin: 0;
                border-radius: 0;
                border: none;
                max-height: 100vh;
            }
        }

        /* ---------- HEADER ---------- */
        .chat-header {
            padding: 20px 28px;
            background: rgba(15, 15, 15, 0.6);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-identity {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .bot-avatar {
            width: 42px;
            height: 42px;
            background: rgba(29, 233, 182, 0.1);
            border: 1px solid rgba(29, 233, 182, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-teal);
            font-size: 18px;
            box-shadow: 0 0 12px rgba(29, 233, 182, 0.2);
        }

        .bot-status h2 {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .bot-status .status-tag {
            font-size: 11px;
            color: var(--accent-teal);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-tag::before {
            content: '';
            width: 7px;
            height: 7px;
            background-color: var(--accent-teal);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 6px var(--accent-teal);
        }

        /* Close/Cancel cross button */
        .btn-close-chat {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .btn-close-chat:hover {
            background: rgba(245, 166, 35, 0.15);
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            transform: scale(1.05);
        }

        /* ---------- CHAT AREA & MESSAGES ---------- */
        .chat-body {
            flex: 1;
            padding: 28px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: rgba(10, 10, 10, 0.4);
        }

        /* Custom scrollbar for message area */
        .chat-body::-webkit-scrollbar {
            width: 6px;
        }

        .chat-body::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* Single Message Bubble wrapper */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            animation: slideIn 0.3s ease forwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Bot replies aligned to the left */
        .message.bot {
            align-self: flex-start;
        }

        /* User messages aligned to the right */
        .message.user {
            align-self: flex-end;
        }

        .message-content {
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 13.5px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.bot .message-content {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #f1f1f1;
            border-top-left-radius: 4px;
        }

        .message.user .message-content {
            background: var(--accent-teal);
            color: #111111;
            font-weight: 500;
            border-top-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(29, 233, 182, 0.2);
        }

        .message-time {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 5px;
            align-self: flex-end;
        }

        .message.bot .message-time {
            align-self: flex-start;
            margin-left: 2px;
        }

        /* ---------- FOOTER INPUT ---------- */
        .chat-footer {
            padding: 20px 28px;
            background: rgba(15, 15, 15, 0.6);
            border-top: 1px solid var(--border-subtle);
        }

        .chat-input-form {
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-btn);
            padding: 6px 6px 6px 20px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .chat-input-form:focus-within {
            border-color: rgba(29, 233, 182, 0.4);
            box-shadow: 0 0 10px rgba(29, 233, 182, 0.05);
        }

        .chat-input-form input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 13.5px;
            font-family: 'Poppins', sans-serif;
            height: 44px;
        }

        .chat-input-form input::placeholder {
            color: var(--text-muted);
        }

        .btn-send {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--accent-teal);
            border: none;
            color: #111111;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(29, 233, 182, 0.25);
            flex-shrink: 0;
        }

        .btn-send:hover {
            transform: scale(1.04);
            background: #14cd9e;
        }
    </style>
</head>

<body>

    <div class="chat-container">
        <header class="chat-header">
            <div class="chat-identity">
                <div class="bot-avatar">
                    <i class="fa-solid fa-heart-pulse"></i>
                </div>
                <div class="bot-status">
                    <h2>VitaPulse Assistant</h2>
                    <span class="status-tag">Online</span>
                </div>
            </div>

            <a href="index.html" class="btn-close-chat" title="Exit Chat">
                <i class="fa-solid fa-xmark"></i>
            </a>
        </header>

        <main class="chat-body" id="chatBody">
            <div class="message bot">
                <div class="message-content">
                    Hello! I'm your VitaPulse wellness guide. How can I help you today with your fitness or wellness
                    goals?
                </div>
                <div class="message-time" id="welcomeTime"></div>
            </div>
        </main>

        <footer class="chat-footer">
            <form class="chat-input-form" id="chatForm">
                <input type="text" id="userInput" placeholder="Ask about fitness programs, diets, or wellness..."
                    autocomplete="off">
                <button type="submit" class="btn-send" aria-label="Send message">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
        </footer>
    </div>

    <script>
        (function () {
            const chatForm = document.getElementById('chatForm');
            const userInput = document.getElementById('userInput');
            const chatBody = document.getElementById('chatBody');
            const welcomeTime = document.getElementById('welcomeTime');

            // Format current local time
            function getTime() {
                const now = new Date();
                let hours = now.getHours();
                let minutes = now.getMinutes();
                const ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12 || 12;
                minutes = minutes < 10 ? '0' + minutes : minutes;
                return `${hours}:${minutes} ${ampm}`;
            }

            // Set dynamic time for initial bot message
            welcomeTime.textContent = getTime();

            // Handle user submission
            chatForm.addEventListener('submit', function (e) {
                e.preventDefault();
                const text = userInput.value.trim();
                if (!text) return;

                // 1. Add user message bubble
                appendMessage(text, 'user');
                userInput.value = '';

                // 2. Simulate typing delay & add bot reply
                setTimeout(() => {
                    const botResponse = getBotSimulatedResponse(text);
                    appendMessage(botResponse, 'bot');
                }, 750);
            });

            // Append messages directly into the UI
            function appendMessage(text, sender) {
                const msgWrapper = document.createElement('div');
                msgWrapper.classList.add('message', sender);

                const content = document.createElement('div');
                content.classList.add('message-content');
                content.textContent = text;

                const time = document.createElement('div');
                time.classList.add('message-time');
                time.textContent = getTime();

                msgWrapper.appendChild(content);
                msgWrapper.appendChild(time);
                chatBody.appendChild(msgWrapper);

                // Scroll automatically to bottom
                chatBody.scrollTop = chatBody.scrollHeight;
            }

            // Simple mocked responses for a complete frontend demonstration
            function getBotSimulatedResponse(query) {
                const lower = query.toLowerCase();
                if (lower.includes('hello') || lower.includes('hi')) {
                    return "Hi there! How can I assist you with your fitness and health journey today?";
                } else if (lower.includes('fitness') || lower.includes('workout')) {
                    return "We offer high-protein meal plans and customized fitness routines! You can check out our programs in the Wellness section.";
                } else if (lower.includes('bmi')) {
                    return "You can use our active BMI Calculator in the site navigation to check your health baseline!";
                }
                return "That's a fantastic goal. Let's build your routine together. Is there anything specific you would like to know?";
            }
        })();
    </script>
</body>

</html>
