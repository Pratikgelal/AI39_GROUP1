<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started - VitaPulse</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0a0c;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .modal-overlay {
            background: rgba(0, 0, 0, 0.85);
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-container {
            background: #0d1117;
            border: 1px solid rgba(34, 197, 94, 0.2);
            /* Soft green matching the active progress accent */
            border-radius: 16px;
            width: 680px;
            /* Increased size to match screenshot exactly */
            min-height: 520px;
            max-width: 95%;
            padding: 45px;
            position: relative;
            box-shadow: 0 0 40px rgba(34, 197, 94, 0.08);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            background: none;
            border: none;
            color: #64748b;
            font-size: 26px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #ef4444;
        }

        /* Progress bar segments */
        .progress-bar-container {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .progress-segment {
            flex: 1;
            height: 6px;
            background: #27272a;
            border-radius: 3px;
            transition: background 0.3s ease;
        }

        .progress-segment.active {
            background: #10b981;
            /* Vibrant emerald green */
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
        }

        .step-indicator {
            color: #64748b;
            font-size: 13px;
            text-align: center;
            margin-bottom: 28px;
        }

        h2 {
            font-size: 26px;
            margin-bottom: 22px;
            color: #fff;
        }

        /* Steps & Layout Transitions */
        .step-content {
            display: none;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease-in-out;
            flex-grow: 1;
        }

        .step-content.active {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            opacity: 1;
            transform: translateY(0);
        }

        /* Form Fields Grid For Step 1 */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 15px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 6px;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 14px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group input:focus,
        .input-group select:focus {
            border-color: #10b981;
            box-shadow: 0 0 6px rgba(16, 185, 129, 0.2);
        }

        /* Gender selection layout */
        .radio-group {
            display: flex;
            gap: 20px;
            padding: 14px 0;
            align-items: center;
        }

        .radio-label {
            display: flex;
            align-items: center;
            font-size: 15px;
            color: #e2e8f0;
            cursor: pointer;
        }

        .radio-label input {
            margin-right: 8px;
            accent-color: #10b981;
            width: 18px;
            height: 18px;
        }

        /* Option Lists & Buttons Styles */
        .options-list,
        .grid-options {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .grid-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
        }

        .other-condition-box {
            grid-column: span 2;
            margin-top: 10px;
        }

        .option-btn {
            background: #161b22;
            border: 1px solid #30363d;
            color: #e2e8f0;
            padding: 16px 20px;
            border-radius: 10px;
            text-align: left;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            display: flex;
            align-items: center;
        }

        .option-btn .icon {
            margin-right: 14px;
            font-size: 20px;
        }

        .option-btn:hover {
            border-color: #10b981;
            background: #1c2128;
        }

        .option-btn.selected {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.08);
            color: #10b981;
        }

        /* Footer Navigation */
        .modal-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
        }

        .footer-btn {
            padding: 15px 32px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            border: none;
        }

        .back-btn {
            background: #161b22;
            border: 1px solid #30363d;
            color: #8b949e;
        }

        .back-btn:hover {
            background: #21262d;
            color: #c9d1d9;
        }

        .next-btn {
            background: #10b981;
            color: #0d1117;
            flex: 1;
            margin-left: 15px;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3);
        }

        .next-btn:hover {
            background: #059669;
            transform: translateY(-1px);
        }
    </style>
</head>

<body>

    <div class="modal-overlay">
        <div class="modal-container">

            <button class="close-btn" onclick="window.location.href='index.html'">&times;</button>

            <div>
                <div class="progress-bar-container">
                    <div class="progress-segment" id="seg-1"></div>
                    <div class="progress-segment" id="seg-2"></div>
                    <div class="progress-segment" id="seg-3"></div>
                    <div class="progress-segment" id="seg-4"></div>
                    <div class="progress-segment" id="seg-5"></div>
                    <div class="progress-segment" id="seg-6"></div>
                    <div class="progress-segment" id="seg-7"></div>
                </div>
                <p class="step-indicator" id="step-indicator">Step 1 of 7</p>
            </div>

            <div class="step-content active" id="step-1">
                <h2>Basic Information</h2>
                <div class="form-grid">
                    <div class="input-group">
                        <label for="first-name">First Name</label>
                        <input type="text" id="first-name" placeholder="Enter first name" required>
                    </div>
                    <div class="input-group">
                        <label for="last-name">Last Name</label>
                        <input type="text" id="last-name" placeholder="Enter last name" required>
                    </div>
                    <div class="input-group">
                        <label for="age">Age</label>
                        <select id="age" required>
                            <option value="" disabled selected>Select age</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Gender</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="gender" value="Male" checked> Male
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="gender" value="Female"> Female
                            </label>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="height">Height (cm)</label>
                        <input type="number" id="height" placeholder="e.g. 170" required>
                    </div>
                    <div class="input-group">
                        <label for="weight">Weight (kg)</label>
                        <input type="number" id="weight" placeholder="e.g. 70" required>
                    </div>
                </div>
            </div>

            <div class="step-content" id="step-2">
                <h2>What's Your Goal?</h2>
                <div class="options-list">
                    <button class="option-btn" onclick="selectGoal('Lose Weight', this)">
                        <span class="icon">🎯</span> Lose Weight
                    </button>
                    <button class="option-btn" onclick="selectGoal('Gain Muscle', this)">
                        <span class="icon">💪</span> Gain Muscle
                    </button>
                    <button class="option-btn" onclick="selectGoal('Stay Healthy', this)">
                        <span class="icon">❤️</span> Stay Healthy
                    </button>
                </div>
            </div>

            <div class="step-content" id="step-3">
                <h2>Activity Level</h2>
                <div class="options-list">
                    <button class="option-btn" onclick="selectActivity('Sedentary', this)">
                        <strong>Sedentary</strong><br><small style="color:#64748b;">Little to no exercise</small>
                    </button>
                    <button class="option-btn" onclick="selectActivity('Light', this)">
                        <strong>Light</strong><br><small style="color:#64748b;">1-2 days/week</small>
                    </button>
                    <button class="option-btn" onclick="selectActivity('Moderate', this)">
                        <strong>Moderate</strong><br><small style="color:#64748b;">3-5 days/week</small>
                    </button>
                    <button class="option-btn" onclick="selectActivity('Active', this)">
                        <strong>Active</strong><br><small style="color:#64748b;">6-7 days/week</small>
                    </button>
                </div>
            </div>

            <div class="step-content" id="step-4">
                <h2>Sleep Habits</h2>
                <div class="input-group">
                    <label for="sleep-hours" style="font-size:15px;">Sleep Hours: <span id="sleep-hours-val"
                            style="color:#10b981; font-weight:bold;">8</span> hours</label>
                    <input type="range" id="sleep-hours" min="4" max="12" value="8"
                        oninput="document.getElementById('sleep-hours-val').innerText = this.value"
                        style="accent-color:#10b981; margin: 15px 0;">
                </div>
                <div class="input-group">
                    <label for="sleep-quality">Sleep Quality</label>
                    <select id="sleep-quality">
                        <option value="Good">Good</option>
                        <option value="Fair">Fair</option>
                        <option value="Poor">Poor</option>
                    </select>
                </div>
            </div>

            <div class="step-content" id="step-5">
                <h2>Diet Preference</h2>
                <div class="grid-options">
                    <button class="option-btn" onclick="selectDiet('Vegetarian', this)">Vegetarian</button>
                    <button class="option-btn" onclick="selectDiet('Non-Vegetarian', this)">Non-Vegetarian</button>
                    <button class="option-btn" onclick="selectDiet('Vegan', this)">Vegan</button>
                    <button class="option-btn" onclick="selectDiet('Keto', this)">Keto</button>
                </div>
            </div>

            <div class="step-content" id="step-6">
                <h2>Any Health Conditions?</h2>
                <div class="grid-options">
                    <button class="option-btn multi-select"
                        onclick="toggleCondition('Diabetes', this)">Diabetes</button>
                    <button class="option-btn multi-select"
                        onclick="toggleCondition('Hypertension', this)">Hypertension</button>
                    <button class="option-btn multi-select" onclick="toggleCondition('None', this)">None</button>
                </div>
                <div class="input-group other-condition-box">
                    <label for="other-disease">Others / Specific Condition</label>
                    <input type="text" id="other-disease" placeholder="Type your condition here if not listed above">
                </div>
            </div>

            <div class="modal-footer">
                <button class="footer-btn back-btn" id="prev-btn" onclick="prevStep()">‹ Back</button>
                <button class="footer-btn next-btn" id="next-btn" onclick="nextStep()">Next Step ›</button>
            </div>

        </div>
    </div>

    <script>
        let currentStep = 1;
        const totalSteps = 7;

        let userData = {
            firstName: "",
            lastName: "",
            age: "",
            gender: "Male",
            height: "",
            weight: "",
            goal: "",
            activityLevel: "",
            sleepHours: 8,
            sleepQuality: "Good",
            dietPreference: "",
            conditions: [],
            otherCondition: ""
        };

        // Populate Age Dropdown
        const ageSelect = document.getElementById('age');
        for (let age = 12; age <= 100; age++) {
            let opt = document.createElement('option');
            opt.value = age;
            opt.innerText = age;
            ageSelect.appendChild(opt);
        }

        function updateUI() {
            for (let i = 1; i <= totalSteps; i++) {
                const stepEl = document.getElementById(`step-${i}`);
                const segmentEl = document.getElementById(`seg-${i}`);

                if (stepEl) {
                    if (i === currentStep) {
                        stepEl.classList.add("active");
                    } else {
                        stepEl.classList.remove("active");
                    }
                }

                if (segmentEl) {
                    if (i <= currentStep) {
                        segmentEl.classList.add("active");
                    } else {
                        segmentEl.classList.remove("active");
                    }
                }
            }

            document.getElementById("step-indicator").innerText = `Step ${currentStep} of ${totalSteps}`;

            const prevBtn = document.getElementById("prev-btn");
            if (currentStep === 1) {
                prevBtn.style.visibility = "hidden";
            } else {
                prevBtn.style.visibility = "visible";
            }
        }

        function nextStep() {
            // Step 1 Validation
            if (currentStep === 1) {
                const fName = document.getElementById("first-name").value.trim();
                const lName = document.getElementById("last-name").value.trim();
                const age = document.getElementById("age").value;
                const gender = document.querySelector('input[name="gender"]:checked').value;
                const height = document.getElementById("height").value;
                const weight = document.getElementById("weight").value;

                if (!fName || !lName || !age || !height || !weight) {
                    alert("Please fill in all basic information fields before moving forward.");
                    return;
                }

                userData.firstName = fName;
                userData.lastName = lName;
                userData.age = age;
                userData.gender = gender;
                userData.height = height;
                userData.weight = weight;
            }

            // Step 2 Validation
            if (currentStep === 2 && !userData.goal) {
                alert("Please select your goal.");
                return;
            }

            // Step 3 Validation
            if (currentStep === 3 && !userData.activityLevel) {
                alert("Please select your activity level.");
                return;
            }

            // Step 4 Validation
            if (currentStep === 4) {
                userData.sleepHours = document.getElementById("sleep-hours").value;
                userData.sleepQuality = document.getElementById("sleep-quality").value;
            }

            // Step 5 Validation
            if (currentStep === 5 && !userData.dietPreference) {
                alert("Please select your diet preference.");
                return;
            }

            // Final Transition on step 6
            if (currentStep === 6) {
                const otherInput = document.getElementById("other-disease").value.trim();
                userData.otherCondition = otherInput;

                if (userData.conditions.length === 0 && !otherInput) {
                    alert("Please pick a condition, select 'None', or enter your specific condition.");
                    return;
                }

                // Add the collected answers safely to storage
                sessionStorage.setItem("onboarding_data", JSON.stringify(userData));

                // Direct transition redirecting exactly to step 7 on registration page
                window.location.href = "register.html";
                return;
            }

            if (currentStep < totalSteps) {
                currentStep++;
                updateUI();
            }
        }

        function prevStep() {
            if (currentStep > 1) {
                currentStep--;
                updateUI();
            }
        }

        function selectGoal(goalValue, btnElement) {
            userData.goal = goalValue;
            clearSelection("#step-2 .option-btn");
            btnElement.classList.add("selected");
        }

        function selectActivity(activityValue, btnElement) {
            userData.activityLevel = activityValue;
            clearSelection("#step-3 .option-btn");
            btnElement.classList.add("selected");
        }

        function selectDiet(dietValue, btnElement) {
            userData.dietPreference = dietValue;
            clearSelection("#step-5 .option-btn");
            btnElement.classList.add("selected");
        }

        function toggleCondition(conditionValue, btnElement) {
            if (conditionValue === "None") {
                userData.conditions = ["None"];
                clearSelection("#step-6 .option-btn.multi-select");
                btnElement.classList.add("selected");
            } else {
                userData.conditions = userData.conditions.filter(item => item !== "None");
                const noneBtn = Array.from(document.querySelectorAll("#step-6 .option-btn.multi-select"))
                    .find(el => el.innerText.includes("None"));
                if (noneBtn) noneBtn.classList.remove("selected");

                if (userData.conditions.includes(conditionValue)) {
                    userData.conditions = userData.conditions.filter(item => item !== conditionValue);
                    btnElement.classList.remove("selected");
                } else {
                    userData.conditions.push(conditionValue);
                    btnElement.classList.add("selected");
                }
            }
        }

        function clearSelection(selector) {
            document.querySelectorAll(selector).forEach(btn => btn.classList.remove("selected"));
        }

        updateUI();
    </script>
</body>

</html>
