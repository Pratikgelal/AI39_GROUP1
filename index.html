<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VitaPulse - Under Maintenance</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    /* Background glow */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 25% 25%, rgba(56,189,248,0.18), transparent 40%),
                  radial-gradient(circle at 75% 70%, rgba(34,197,94,0.15), transparent 40%);
      animation: glowMove 10s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes glowMove {
      from { transform: scale(1); }
      to { transform: scale(1.2); }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 600px;
      padding: 35px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 22px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);
    }

    /* Logo area */
    .logo-box {
      width: 90px;
      height: 90px;
      margin: 0 auto 15px;
      border-radius: 18px;
      background: rgba(255,255,255,0.08);
      border: 1px dashed rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .logo-text {
      font-size: 40px;
      font-weight: 800;
      color: #38bdf8;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .logo-text span {
      color: #22c55e;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    p {
      font-size: 15px;
      color: #cbd5e1;
      line-height: 1.6;
      margin-top: 10px;
    }

    .badge {
      display: inline-block;
      margin-top: 18px;
      padding: 6px 14px;
      background: #22c55e;
      border-radius: 20px;
      font-size: 12px;
      color: #0f172a;
      font-weight: bold;
    }

    .footer {
      margin-top: 22px;
      font-size: 12px;
      color: #94a3b8;
    }

    /* Optional pulse animation */
    .pulse {
      width: 10px;
      height: 10px;
      background: #38bdf8;
      border-radius: 50%;
      display: inline-block;
      margin-left: 6px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.8); opacity: 0.5; }
      100% { transform: scale(1); opacity: 1; }
    }

    @media (max-width: 600px) {
      .container {
        margin: 20px;
        padding: 25px;
      }

      h1 {
        font-size: 20px;
      }

      .logo-text {
        font-size: 32px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LOGO AREA (replace src with your image) -->
    <div class="logo-box">
      <!-- Put your logo image here -->
      <!-- Example: <img src="logo.png" alt="VitaPulse Logo"> -->
    </div>

    <div class="logo-text">Vita<span>Pulse</span></div>

    <h1>Under Maintenance <span class="pulse"></span></h1>

    <p>
      We’re currently upgrading VitaPulse to improve performance, design,
      and your overall fitness tracking experience.
      We’ll be back stronger and better soon.
    </p>

    <div class="badge">Maintenance Mode</div>

    <p class="footer">
      © 2026 VitaPulse. All rights reserved.
    </p>

  </div>

</body>
</html>
