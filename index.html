<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VitaPulse - Under Maintenance</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    /* Soft glowing background effect */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 30%, rgba(56,189,248,0.15), transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(34,197,94,0.12), transparent 40%);
      animation: moveGlow 8s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes moveGlow {
      from { transform: scale(1); }
      to { transform: scale(1.2); }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 600px;
      padding: 30px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
    }

    .logo {
      font-size: 42px;
      font-weight: 800;
      margin-bottom: 10px;
      color: #38bdf8;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .logo span {
      color: #22c55e;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
    }

    p {
      font-size: 15px;
      color: #cbd5e1;
      line-height: 1.6;
      margin-top: 10px;
    }

    .loader {
      margin: 20px auto;
      border: 4px solid #334155;
      border-top: 4px solid #38bdf8;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .badge {
      display: inline-block;
      margin-top: 15px;
      padding: 6px 14px;
      background: #22c55e;
      border-radius: 20px;
      font-size: 12px;
      color: #0f172a;
      font-weight: bold;
    }

    #countdown {
      margin-top: 12px;
      color: #38bdf8;
      font-weight: bold;
      font-size: 14px;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #94a3b8;
    }

    /* Mobile responsive */
    @media (max-width: 600px) {
      .container {
        margin: 20px;
        padding: 20px;
      }

      h1 {
        font-size: 20px;
      }

      .logo {
        font-size: 34px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="logo">Vita<span>Pulse</span> ⚡</div>

    <h1>We’ll be back soon</h1>

    <div class="loader"></div>

    <p>
      Our website is currently under maintenance to bring you a better experience.
      We are improving performance, design, and adding new features for your fitness journey.
    </p>

    <div class="badge">Under Maintenance</div>

    <p id="countdown"></p>

    <p class="footer">
      © 2026 VitaPulse. All rights reserved.
    </p>

  </div>

  <script>
    // Countdown (change date if needed)
    const targetDate = new Date("2026-05-01T00:00:00").getTime();

    const countdown = setInterval(() => {
      const now = new Date().getTime();
      const diff = targetDate - now;

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000*60*60));
      const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000*60));

      if (diff > 0) {
        document.getElementById("countdown").innerHTML =
          `Back in ${days}d ${hours}h ${mins}m`;
      } else {
        document.getElementById("countdown").innerHTML =
          "We are back online!";
        clearInterval(countdown);
      }
    }, 1000);
  </script>

</body>
</html>
