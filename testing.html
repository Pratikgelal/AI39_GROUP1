<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VitaPulse - Under Maintenance</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 30px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
    }

    .logo {
      font-size: 40px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #38bdf8;
      letter-spacing: 2px;
    }

    .logo span {
      color: #22c55e;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      color: #cbd5e1;
      line-height: 1.6;
    }

    .loader {
      margin: 20px auto;
      border: 4px solid #334155;
      border-top: 4px solid #38bdf8;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #94a3b8;
    }

    .badge {
      display: inline-block;
      margin-top: 15px;
      padding: 5px 12px;
      background: #22c55e;
      border-radius: 20px;
      font-size: 12px;
      color: #0f172a;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo">Vita<span>Pulse</span></div>

    <h1>We’ll be back soon ⚡</h1>

    <div class="loader"></div>

    <p>
      Our website is currently under maintenance to bring you a better experience.
      We are improving performance, design, and new features for your fitness journey.
    </p>

    <div class="badge">Under Maintenance</div>

    <p class="footer">
      © 2026 VitaPulse. All rights reserved.
    </p>
  </div>

</body>
</html>
